name: Minecraft Bedrock Cloud Host + SFTP & WebSSH

on:
  workflow_dispatch:

jobs:
  minecraft-host:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      # ==========================================
      # 1. RESTAURATION COMPLÈTE DU CACHE
      # ==========================================
      - name: "Restauration du serveur et de Playit"
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/minecraft-server
            /home/runner/.config/playit
          key: mcb-cloud-v8-${{ github.run_id }}
          restore-keys: mcb-cloud-v8-

      # ==========================================
      # 2. INSTALLATION DES DÉPENDANCES, SSH ET SSH-WEBSOCKET (TTYD)
      # ==========================================
      - name: "Installer les paquets, SSH et WebSSH"
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget libcurl4 curl gnupg openssh-server ttyd
          
          echo "runner:${{ secrets.SFTP_PASS }}" | sudo chpasswd
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

      # ==========================================
      # 3. CONNEXION SÉCURISÉE VIA TAILSCALE
      # ==========================================
      - name: "Connexion Tailscale (Accès Privé Sécurisé)"
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      # ==========================================
      # 4. CONFIGURATION AUTOMATIQUE DE PLAYIT (IP FIXE)
      # ==========================================
      - name: "Installer et configurer Playit.gg"
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/playit.gpg
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit.list
          sudo apt-get update && sudo apt-get install playit -y
          
          # 🛑 CORRECTION 1 : On coupe immédiatement le Playit "vide" lancé par apt
          sudo systemctl stop playit || true
          
          sudo mkdir -p /etc/playit
          if [ -f "/home/runner/.config/playit/playit.toml" ]; then
            sudo cp /home/runner/.config/playit/playit.toml /etc/playit/playit.toml
            echo "✅ Configuration Playit (IP Fixe) injectée avec succès dans le système !"
          else
            echo "ℹ️ Première session ou cache vide : un nouveau tunnel va être créé."
          fi

      # ==========================================
      # 5. PRÉPARATION ET INJECTION DES CONFIGURATIONS
      # ==========================================
      - name: "Vérification et initialisation de Minecraft"
        run: |
          mkdir -p /home/runner/minecraft-server
          cd /home/runner/minecraft-server

          if [ ! -f "bedrock_server" ]; then
            echo "📥 Téléchargement initial de la version 1.19.50.02..."
            wget -q https://minecraft.net/bedrockdedicatedserver/bin-linux/bedrock-server-1.19.50.02.zip
            unzip -q bedrock-server-1.19.50.02.zip
            rm bedrock-server-1.19.50.02.zip
            chmod +x bedrock_server
          fi

          cat << 'EOF' > permissions.json
          [
            {
              "permissionLevel": "operator",
              "xuid": "2535408392300798"
            }
          ]
          EOF

          cat << 'EOF' > server.properties
          server-name=Dedicated Server
          gamemode=survival
          force-gamemode=false
          difficulty=easy
          allow-cheats=true
          max-players=30
          online-mode=false
          allow-list=false
          server-port=19132
          server-portv6=19133
          enable-lan-visibility=true
          view-distance=8
          tick-distance=4
          player-idle-timeout=30
          max-threads=8
          level-name=Bedrock level
          level-seed=network
          default-player-permission-level=member
          texturepack-required=false
          content-log-file-enabled=false
          compression-threshold=1
          compression-algorithm=zlib
          server-authoritative-movement=server-auth
          player-movement-score-threshold=20
          player-movement-action-direction-threshold=0.85
          player-movement-distance-threshold=0.3
          player-movement-duration-threshold-in-ms=500
          correct-player-movement=false
          server-authoritative-block-breaking=false
          chat-restriction=None
          disable-player-interaction=false
          client-side-chunk-generation-enabled=true
          EOF

      # ==========================================
      # 6. DÉMARRAGE ET SURVEILLANCE INTELLIGENTE
      # ==========================================
      - name: "Lancement du serveur & Monitoring en direct"
        env:
          SECURE_SSH_PASS: ${{ secrets.SFTP_PASS }}
        run: |
          # 🔄 CORRECTION 2 : On RESTART au lieu de START pour forcer la lecture du fichier injecté
          sudo systemctl restart playit
          sleep 5

          ttyd -i 0.0.0.0 -p 7681 -c "runner:$SECURE_SSH_PASS" bash > ttyd.log 2>&1 &
          
          echo "========================================================="
          echo "🌐 SSH WEB-SOCKET ACTIF !"
          echo "========================================================="

          # Affichage du lien si c'est une première configuration
          if [ ! -f "/home/runner/.config/playit/playit.toml" ]; then
            echo "🔗 CLIQUE SUR CE LIEN POUR ASSOCIER TON COMPTE PLAYIT :"
            sudo journalctl -u playit --no-pager | grep -o 'https://playit.gg/claim/[^ ]*' || echo "Lien dispo sur playit.gg"
            echo "========================================================="
          fi

          cd /home/runner/minecraft-server
          export LD_LIBRARY_PATH=.
          rm -f stop.txt

          [ -p mcb.fifo ] || mkfifo mcb.fifo
          ./bedrock_server < mcb.fifo &
          MC_PID=$!
          exec 3>mcb.fifo

          # Boucle de surveillance (5h30 max)
          MAX_TIME=19800
          ELAPSED=0
          
          while kill -0 $MC_PID 2>/dev/null; do
            sleep 5
            ELAPSED=$((ELAPSED + 5))
            
            if [ -f "/home/runner/minecraft-server/stop.txt" ]; then
              echo "🛑 [SFTP] Fichier stop.txt détecté ! Arrêt propre..."
              echo "stop" > mcb.fifo
              rm -f "/home/runner/minecraft-server/stop.txt"
              wait $MC_PID
              
              # 🔥 SAUVEGARDE STRICTE DE L'IP
              echo "💾 Sauvegarde de l'identité Playit dans le cache..."
              mkdir -p /home/runner/.config/playit
              if [ -f "/etc/playit/playit.toml" ]; then
                sudo cp /etc/playit/playit.toml /home/runner/.config/playit/playit.toml
                sudo chown runner:runner /home/runner/.config/playit/playit.toml
              fi
              break
            fi

            if [ $ELAPSED -ge $MAX_TIME ]; then
              echo "⚠️ Sécurité atteinte. Fermeture automatique..."
              echo "stop" > mcb.fifo
              wait $MC_PID
              
              mkdir -p /home/runner/.config/playit
              if [ -f "/etc/playit/playit.toml" ]; then
                sudo cp /etc/playit/playit.toml /home/runner/.config/playit/playit.toml
                sudo chown runner:runner /home/runner/.config/playit/playit.toml
              fi
              break
            fi
          done
